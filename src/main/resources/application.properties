quarkus.http.port=8080
%prod.quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database = words

# Liquibase MongoDB configuration
quarkus.liquibase-mongodb.change-log=db/changelog/db.changelog-master.yaml
quarkus.liquibase-mongodb.migrate-at-start=true

# gRPC Server Configuration
quarkus.grpc.server.port=9000
quarkus.grpc.server.test-port=9001

# Enable gRPC Reflection (useful for testing with grpcurl)
quarkus.grpc.server.enable-reflection-service=true

# Dev Services (auto-starts MongoDB for development)
quarkus.mongodb.devservices.enabled=true

# Containerization Configuration (docker hub)
quarkus.container-image.group=qaserfde
quarkus.container-image.name=words-backend-reactive
quarkus.container-image.tag=1.0.0