                      "text": "לִפְחֹד",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). Не бойся! (אַל תִּפְחַד!)"
                    },
                    {
                      "language": "ru",
                      "text": "Бояться",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
