                      "text": "לְחַפֵּשׂ",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pi'el (שלם). Интенсивное действие; Я ищу ключи. (אֲנִי מְחַפֵּשׂ אֶת הַמַּפְתְּחוֹת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Искать",
                      "partOfSpeech": "verb"
