                      "text": "לְדַבֵּר",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pi'el (שלם). Самый частый глагол для \"говорить\"; Я говорю на иврите. (אֲנִי מְדַבֵּר עִבְרִית.)"
                    },
                    {
                      "language": "ru",
                      "text": "Говорить",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
