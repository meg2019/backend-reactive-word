databaseChangeLog:
  - changeSet:
      id: 002-insert-hebrew-verbs
      author: developer
      changes:
        - insertMany:
            collectionName: concepts
            documents: |
              [
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִהְיוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י/ל\"ה). Неправильный, используется для построения времен; Я буду здесь завтра. (אֲנִי אֶהְיֶה כָּאן מָחָר.)"
                    },
                    {
                      "language": "ru",
                      "text": "Быть",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לוֹמַר",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). В настоящем времени: אומר (омэр); Я хочу сказать тебе что-то. (אֲנִי רוֹצֶה לוֹמַר לְךָ מַשֶּׁהוּ.)"
                    },
                    {
                      "language": "ru",
                      "text": "Сказать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָבוֹא",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). אֶל/לְ Используется с предлогом Они приходят домой поздно. (הֵם בָּאִים הַבַּיְתָה מְאוּחָר.)"
                    },
                    {
                      "language": "ru",
                      "text": "Приходить",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָלֶכֶת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). В прошедшем: הָלַכְתִי (hала́хти); Мы идем в парк. (אֲנַחְנוּ הוֹלְכִים לַפָּארְק.)"
                    },
                    {
                      "language": "ru",
                      "text": "Идти/Ходить",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַעֲשׂוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Один из самых важных глаголов; Что ты делаешь? (מָה אַתָּה עוֹשֶׂה?)"
                    },
                    {
                      "language": "ru",
                      "text": "Делать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָתֵת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י/פ\"נ). נ.ת.נ Неправильный, корень; Она дает мне книгу. (הִיא נוֹתֶנֶת לִי סֵפֶר.)"
                    },
                    {
                      "language": "ru",
                      "text": "Давать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָקַחַת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). ל.ק.ח Неправильный, корень; Я возьму это сейчас. (אֲנִי אֶקַּח אֶת זֶה עַכְשָׁיו.)"
                    },
                    {
                      "language": "ru",
                      "text": "Брать/Покупать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָדַעַת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Знать факт, информацию; Ты знаешь ответ? (אַתָּה יוֹדֵעַ אֶת הַתְּשׁוּבָה?)"
                    },
                    {
                      "language": "ru",
                      "text": "Знать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לֶאֱכֹל",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"א). א – гортанная буква; Что ты ешь на завтрак? (מָה אַתָּה אוֹכֵל בָּאֲרוּחַת בֹּקֶר?)"
                    },
                    {
                      "language": "ru",
                      "text": "Есть (кушать)",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִשְׁתוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Я пью воду каждый день. (אֲנִי שׁוֹתֶה מַיִם כָּל יוֹם.)"
                    },
                    {
                      "language": "ru",
                      "text": "Пить",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִרְאוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Он видит свой дом издалека. (הוּא רוֹאֶה אֶת בֵּיתוֹ מֵרָחוֹק.)"
                    },
                    {
                      "language": "ru",
                      "text": "Видеть",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִשְׁמֹעַ",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ע\"ג). ע – гортанная буква; Я слышу музыку. (אֲנִי שׁוֹמֵעַ מוּזִיקָה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Слышать/Слушать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִכְתּוֹב",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). «Шалэм» – правильный корень; Она пишет письмо. (הִיא כּוֹתֶבֶת מִכְתָּב.)"
                    },
                    {
                      "language": "ru",
                      "text": "Писать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִקְרֹא",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"א). א – гортанная буква; Я читаю эту книгу. (אֲנִי קוֹרֵא אֶת הַסֵּפֶר הַזֶּה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Читать/Звать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָשֶׁבֶת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). Они сидят в кафе. (הֵם יוֹשְׁבִים בְּבֵית קָפֶה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Сидеть",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַעֲמֹד",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ע\"ג). ע – гортанная буква; Она стоит у двери. (הִיא עוֹמֶדֶת לְיַד הַדֶּלֶת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Стоять",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָגוּר",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ע\"ו/ע\"י). קו\"ף (Kuf); Где ты живешь? (אֵיפֹה אַתָּה גָּר?)"
                    },
                    {
                      "language": "ru",
                      "text": "Жить/Проживать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִישׁוֹן",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"י). Я сплю восемь часов. (אֲנִי יָשֵׁן שְׁמוֹנֶה שָׁעוֹת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Спать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַעֲבֹד",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ע\"ג). Где ты работаешь? (אֵיפֹה אַתָּה עוֹבֵד?)"
                    },
                    {
                      "language": "ru",
                      "text": "Работать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִרְצוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Я хочу пить. (אֲנִי רוֹצֶה לִשְׁתּוֹת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Хотеть",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לֶאֱהֹב",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"א). Я люблю Израиль. (אֲנִי אוֹהֵב אֶת יִשְׂרָאֵל.)"
                    },
                    {
                      "language": "ru",
                      "text": "Любить",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַחֲשׁוֹב",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). О чем ты думаешь? (עַל מָה אַתָּה חוֹשֵׁב?)"
                    },
                    {
                      "language": "ru",
                      "text": "Думать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִשְׁאֹל",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (פ\"א). Я хочу спросить тебя о многом. (אֲנִי רוֹצֶה לִשְׁאֹל אוֹתְךָ הַרְבֵּה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Спрашивать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַעֲנוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Пожалуйста, ответь мне! (בְּבַקָּשָׁה, תַּעֲנֶה לִי!)"
                    },
                    {
                      "language": "ru",
                      "text": "Отвечать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִפְתּוֹחַ",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ע\"ח). ח – гортанная буква; Он открывает окно. (הוּא פּוֹתֵחַ אֶת הַחַלּוֹן.)"
                    },
                    {
                      "language": "ru",
                      "text": "Открывать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִסְגּוֹר",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). Мне нужно закрыть дверь. (אֲנִי צָרִיךְ לִסְגּוֹר אֶת הַדֶּלֶת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Закрывать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִקְנוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Я покупаю новую машину. (אֲנִי קוֹנֶה מְכוֹנִית חֲדָשָׁה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Покупать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִמְכּוֹר",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). Они продают свой дом. (הֵם מוֹכְרִים אֶת הַבַּיִת שֶׁלָּהֶם.)"
                    },
                    {
                      "language": "ru",
                      "text": "Продавать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לַעֲלוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Также \"делать алию\"; Он поднимается по лестнице. (הוּא עוֹלֶה בַּמַּדְרֵגוֹת.)"
                    },
                    {
                      "language": "ru",
                      "text": "Подниматься",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לָרֶדֶת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). Она спускается вниз. (הִיא יוֹרֶדֶת לְמַטָּה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Спускаться",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִבְכּוֹת",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (ל\"ה). Почему ребенок плачет? (לָמָּה הַיֶּלֶד בּוֹכֶה?)"
                    },
                    {
                      "language": "ru",
                      "text": "Плакать",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
                    "name": "Глаголы",
                    "description": "Важные глаголы"
                  },
                  "words": [
                    {
                      "language": "he",
                      "text": "לִצְחֹק",
                      "partOfSpeech": "verb",
                      "comment": "Binyan: Pa'al (שלם). Он много смеется. (הוּא צוֹחֵק הַרְבֵּה.)"
                    },
                    {
                      "language": "ru",
                      "text": "Смеяться",
                      "partOfSpeech": "verb"
                    }
                  ]
                },
                {
                  "topic": {
